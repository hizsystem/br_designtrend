<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>디자인 트렌드 리포트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Funnel+Display:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<section class="hero" id="top">
  <div class="hero-bg" aria-hidden="true"></div>
  <div class="hero-grain" aria-hidden="true"></div>

  <header class="hero-top">
    <a class="hero-badge" href="#top" aria-label="디자인 트렌드 리포트">
      <svg class="badge-spin" viewBox="0 0 100 100" aria-hidden="true">
        <defs><path id="badgeCirc" d="M50,50 m-37,0 a37,37 0 1,1 74,0 a37,37 0 1,1 -74,0"/></defs>
        <text><textPath href="#badgeCirc">DESIGN · TREND · DESIGN · TREND · </textPath></text>
      </svg>
      <span class="badge-dot" aria-hidden="true">✦</span>
    </a>
    <p class="hero-tag">매일 만나는 디자인 트렌드, 쉽게</p>
    <a class="hero-past" href="#past">지난 호 ↓</a>
  </header>

  <h1 class="hero-mega"><span>DESIGN</span><span>TREND</span></h1>

  <a class="hero-card" id="todayCard" href="#" aria-label="오늘 트렌드 보기">
    <img src="https://mir-s3-cdn-cf.behance.net/project_modules/max_1200_webp/76ebc4251637479.6a3b8aaa2193c.jpg" alt="" loading="lazy" onerror="this.style.display='none'">
    <span class="hero-card-label">오늘 트렌드 보기 <b>→</b></span>
  </a>
</section>

<main class="wrap">
  <section class="past-section" id="past">
    <h2>지난 트렌드 보기</h2>
    <div class="photo-cal">
      <div class="pcal-head">
        <button id="calPrev" aria-label="이전 달">‹</button>
        <strong id="calLabel" title="오늘로 이동"></strong>
        <button id="calNext" aria-label="다음 달">›</button>
      </div>
      <div class="pcal-dow" id="calDow"></div>
      <div class="pcal-grid" id="calGrid"></div>
    </div>
  </section>
</main>

<script src="assets/issues.js"></script>
<script>
const ISSUES = (window.ISSUES || []).slice();

// 최신순 정렬(날짜 내림차순)
ISSUES.sort((a, b) => a.date < b.date ? 1 : -1);
const issueByDate = new Map(ISSUES.map(i => [i.date, i]));
const pad = n => String(n).padStart(2, "0");
const todayStr = (() => { const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; })();

// 메인비주얼 사진 클릭 → 오늘자(없으면 최신) 리포트로
(function renderToday() {
  const card = document.getElementById("todayCard");
  if (!card) return;
  const label = card.querySelector(".hero-card-label");
  const img = card.querySelector("img");
  if (issueByDate.has(todayStr)) {
    card.href = `issues/${todayStr}.html`;
    if (label) label.innerHTML = '오늘 트렌드 보기 <b>→</b>';
  } else if (ISSUES.length) {
    card.href = `issues/${ISSUES[0].date}.html`;
    if (label) label.innerHTML = '최신 트렌드 보기 <b>→</b>';
  } else {
    card.removeAttribute("href");
    if (label) label.textContent = "아직 리포트가 없어요";
  }
  // 사진은 최신 호 대표 이미지로 자동 동기화
  if (img && ISSUES.length && ISSUES[0].cover) {
    img.src = ISSUES[0].cover;
    img.style.display = "";
  }
})();

// 사진 달력
const DOW = ["일","월","화","수","목","금","토"];
let viewYear, viewMonth;
(function initCal() {
  const base = ISSUES.length ? ISSUES[0].date.split("-") : todayStr.split("-");
  viewYear = +base[0]; viewMonth = +base[1] - 1;
  document.getElementById("calDow").innerHTML = DOW.map(d => `<span>${d}</span>`).join("");
  renderCalendar();
})();
function renderCalendar() {
  document.getElementById("calLabel").textContent = `${viewYear}년 ${viewMonth+1}월`;
  const first = new Date(viewYear, viewMonth, 1).getDay();
  const days = new Date(viewYear, viewMonth+1, 0).getDate();
  let cells = "";
  for (let i = 0; i < first; i++) cells += `<div class="pcal-cell"></div>`;
  for (let d = 1; d <= days; d++) {
    const ds = `${viewYear}-${pad(viewMonth+1)}-${pad(d)}`;
    const it = issueByDate.get(ds);
    if (it) {
      cells += `<div class="pcal-cell"><a class="pcal-day" href="issues/${ds}.html" title="${it.title || ds}">` +
               `<img src="${it.cover}" alt="" onerror="this.remove()"><span class="num">${d}</span></a></div>`;
    } else {
      cells += `<div class="pcal-cell"><span class="num empty">${d}</span></div>`;
    }
  }
  document.getElementById("calGrid").innerHTML = cells;
}
document.getElementById("calPrev").onclick = () => { if (--viewMonth < 0) { viewMonth = 11; viewYear--; } renderCalendar(); };
document.getElementById("calNext").onclick = () => { if (++viewMonth > 11) { viewMonth = 0; viewYear++; } renderCalendar(); };
// 월 라벨 클릭 → 오늘(이번 달)로 이동
document.getElementById("calLabel").onclick = () => { const d = new Date(); viewYear = d.getFullYear(); viewMonth = d.getMonth(); renderCalendar(); };
</script>
<script src="assets/cursor.js"></script>
</body>
</html>
